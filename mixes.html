<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mixes — DJ Carlos</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --purple: #8B5CF6;
      --pink:   #EC4899;
      --bg:     #0D0D0D;
      --surface: #111111;
      --surface2: #1A1A1A;
      --nav-h:  64px;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: #fff;
      font-family: 'Inter', sans-serif;
      min-height: 100svh;
      overflow-x: hidden;
    }

    /* ─── NAV ─── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--nav-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 clamp(1.5rem, 5vw, 4rem);
      background: rgba(13, 13, 13, 0.82);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(139, 92, 246, 0.18);
      z-index: 100;
      transition: box-shadow 0.3s;
    }

    .nav-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.65rem;
      letter-spacing: 0.08em;
      text-decoration: none;
      background: linear-gradient(90deg, var(--purple), var(--pink));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .nav-links {
      display: flex;
      gap: 2.5rem;
      list-style: none;
      align-items: center;
    }

    .nav-links a {
      color: rgba(255,255,255,0.65);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      transition: color 0.25s;
    }

    .nav-links a:hover,
    .nav-links a.active { color: #fff; }

    .nav-links a.active {
      background: linear-gradient(90deg, var(--purple), var(--pink));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .nav-cta {
      background: linear-gradient(90deg, var(--purple), var(--pink));
      -webkit-text-fill-color: #fff !important;
      color: #fff !important;
      padding: 0.45rem 1.25rem;
      border-radius: 999px;
      transition: box-shadow 0.3s !important;
    }

    .nav-cta:hover {
      box-shadow: 0 0 20px rgba(236, 72, 153, 0.65) !important;
    }

    /* hamburger */
    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
    }

    .hamburger span {
      display: block;
      width: 24px; height: 2px;
      background: #fff;
      border-radius: 2px;
      transition: transform 0.3s, opacity 0.3s;
    }

    .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    .mobile-menu {
      display: none;
      position: fixed;
      top: var(--nav-h); left: 0; right: 0;
      background: rgba(13, 13, 13, 0.97);
      padding: 2rem;
      flex-direction: column;
      gap: 1.5rem;
      z-index: 99;
      border-bottom: 1px solid rgba(139, 92, 246, 0.18);
    }

    .mobile-menu.open { display: flex; }

    .mobile-menu a {
      color: rgba(255,255,255,0.85);
      text-decoration: none;
      font-size: 1.2rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* ─── PAGE LAYOUT ─── */
    .page-wrap {
      padding-top: calc(var(--nav-h) + 3rem);
      padding-bottom: 5rem;
      max-width: 820px;
      margin: 0 auto;
      padding-left: clamp(1.25rem, 5vw, 3rem);
      padding-right: clamp(1.25rem, 5vw, 3rem);
    }

    /* page header */
    .page-header { margin-bottom: 3rem; }

    .page-label {
      font-size: 0.72rem;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      background: linear-gradient(90deg, var(--purple), var(--pink));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 700;
      margin-bottom: 0.55rem;
    }

    .page-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.8rem, 8vw, 5rem);
      letter-spacing: 0.04em;
      line-height: 1;
    }

    /* ─── PLAYER CARD ─── */
    .player-card {
      background: var(--surface);
      border-radius: 24px;
      padding: clamp(1.75rem, 5vw, 2.8rem);
      position: relative;
      overflow: hidden;
      margin-bottom: 2rem;
    }

    /* gradient border */
    .player-card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 24px;
      padding: 1.5px;
      background: linear-gradient(135deg, var(--purple), var(--pink));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
      opacity: 0.55;
    }

    /* ambient glow behind player */
    .player-card::after {
      content: '';
      position: absolute;
      top: -60px; left: 50%;
      transform: translateX(-50%);
      width: 60%;
      height: 120px;
      background: radial-gradient(ellipse at center, rgba(139,92,246,0.22) 0%, transparent 70%);
      pointer-events: none;
    }

    /* ── track info ── */
    .track-info {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      margin-bottom: 2rem;
      position: relative;
      z-index: 1;
    }

    .track-art {
      width: 64px; height: 64px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--purple), var(--pink));
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* vinyl disc animation */
    .vinyl {
      width: 44px; height: 44px;
      border-radius: 50%;
      background:
        radial-gradient(circle at center, #1a1a1a 30%, transparent 32%),
        repeating-conic-gradient(
          rgba(0,0,0,0.4) 0deg 10deg,
          transparent 10deg 20deg
        ),
        linear-gradient(135deg, #2a2a2a, #444);
      box-shadow: 0 0 0 2px rgba(255,255,255,0.08);
      animation: spin 3s linear infinite paused;
    }

    .vinyl.spinning { animation-play-state: running; }

    @keyframes spin { to { transform: rotate(360deg); } }

    .track-meta { flex: 1; min-width: 0; }

    .track-number {
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.38);
      margin-bottom: 0.3rem;
    }

    .track-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      letter-spacing: 0.04em;
      line-height: 1.05;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .track-duration-badge {
      font-size: 0.8rem;
      font-weight: 500;
      color: rgba(255,255,255,0.45);
      margin-top: 0.25rem;
      letter-spacing: 0.05em;
    }

    /* ── progress bar ── */
    .progress-wrap {
      position: relative;
      z-index: 1;
      margin-bottom: 0.6rem;
    }

    .progress-bar {
      width: 100%;
      height: 5px;
      background: rgba(255,255,255,0.10);
      border-radius: 999px;
      cursor: pointer;
      position: relative;
      transition: height 0.18s;
    }

    .progress-bar:hover { height: 7px; }

    .progress-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--purple), var(--pink));
      width: 0%;
      position: relative;
      transition: width 0.1s linear;
      pointer-events: none;
    }

    .progress-fill::after {
      content: '';
      position: absolute;
      right: -5px; top: 50%;
      transform: translateY(-50%);
      width: 12px; height: 12px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 0 8px rgba(236,72,153,0.8);
      opacity: 0;
      transition: opacity 0.18s;
    }

    .progress-bar:hover .progress-fill::after { opacity: 1; }

    /* ── visualizer ── */
    .visualizer-wrap {
      position: relative;
      z-index: 1;
      margin-bottom: 1.4rem;
      border-radius: 10px;
      overflow: hidden;
      background: rgba(255,255,255,0.025);
      border: 1px solid rgba(139, 92, 246, 0.14);
    }

    #visualizer {
      display: block;
      width: 100%;
      height: 80px;
    }

    .time-row {
      display: flex;
      justify-content: space-between;
      margin-top: 0.55rem;
      font-size: 0.72rem;
      color: rgba(255,255,255,0.38);
      letter-spacing: 0.05em;
      font-variant-numeric: tabular-nums;
    }

    /* ── controls ── */
    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(1rem, 4vw, 2rem);
      margin: 1.8rem 0 1.6rem;
      position: relative;
      z-index: 1;
    }

    /* generic control button */
    .ctrl-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: rgba(255,255,255,0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: color 0.22s, transform 0.18s;
      padding: 6px;
    }

    .ctrl-btn:hover { color: #fff; }
    .ctrl-btn:active { transform: scale(0.88); }

    .ctrl-btn svg { display: block; }

    /* play/pause — large gradient circle */
    .play-btn {
      width: 68px; height: 68px;
      background: linear-gradient(135deg, var(--purple), var(--pink));
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      box-shadow: 0 0 0 0 rgba(139,92,246,0.5);
      transition: transform 0.2s, box-shadow 0.3s;
      position: relative;
    }

    .play-btn::after {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--purple), var(--pink));
      z-index: -1;
      opacity: 0;
      filter: blur(12px);
      transition: opacity 0.3s;
    }

    .play-btn:hover {
      transform: scale(1.07);
      box-shadow: 0 0 28px rgba(139,92,246,0.55), 0 0 55px rgba(236,72,153,0.35);
    }

    .play-btn:hover::after { opacity: 1; }
    .play-btn:active { transform: scale(0.95); }

    .play-btn.playing {
      box-shadow: 0 0 20px rgba(139,92,246,0.50), 0 0 40px rgba(236,72,153,0.30);
      animation: pulse-btn 2.4s ease-in-out infinite;
    }

    @keyframes pulse-btn {
      0%, 100% { box-shadow: 0 0 20px rgba(139,92,246,0.50), 0 0 40px rgba(236,72,153,0.30); }
      50%       { box-shadow: 0 0 35px rgba(236,72,153,0.65), 0 0 65px rgba(139,92,246,0.40); }
    }

    /* icon swap */
    .icon-play, .icon-pause { transition: opacity 0.15s; }
    .icon-pause { display: none; }
    .play-btn.playing .icon-play  { display: none; }
    .play-btn.playing .icon-pause { display: block; }

    /* skip buttons */
    .skip-btn {
      width: 46px; height: 46px;
      background: var(--surface2);
      border-radius: 50%;
    }

    .skip-btn:hover {
      background: rgba(139,92,246,0.18);
      color: #fff;
    }

    /* ── volume row ── */
    .volume-row {
      display: flex;
      align-items: center;
      gap: 0.9rem;
      position: relative;
      z-index: 1;
      padding: 0 2px;
    }

    .vol-icon {
      color: rgba(255,255,255,0.40);
      flex-shrink: 0;
      cursor: pointer;
      transition: color 0.2s;
    }

    .vol-icon:hover { color: rgba(255,255,255,0.75); }

    /* custom range (volume) */
    input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      flex: 1;
      height: 4px;
      border-radius: 999px;
      background: rgba(255,255,255,0.10);
      outline: none;
      cursor: pointer;
      position: relative;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 0 6px rgba(236,72,153,0.7);
      cursor: pointer;
      transition: transform 0.18s, box-shadow 0.18s;
    }

    input[type=range]::-moz-range-thumb {
      width: 14px; height: 14px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 0 6px rgba(236,72,153,0.7);
      cursor: pointer;
      border: none;
    }

    input[type=range]:hover::-webkit-slider-thumb {
      transform: scale(1.25);
      box-shadow: 0 0 12px rgba(236,72,153,0.9);
    }

    input[type=range]:hover::-moz-range-thumb {
      transform: scale(1.25);
      box-shadow: 0 0 12px rgba(236,72,153,0.9);
    }

    .vol-pct {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.32);
      width: 34px;
      text-align: right;
      letter-spacing: 0.04em;
      font-variant-numeric: tabular-nums;
    }

    /* ─── PLAYLIST ─── */
    .playlist-label {
      font-size: 0.72rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      font-weight: 600;
      margin-bottom: 1rem;
    }

    .playlist {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .pl-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.25rem;
      background: var(--surface);
      border-radius: 14px;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.05);
      transition: background 0.22s, border-color 0.22s, box-shadow 0.25s, transform 0.18s;
      position: relative;
      overflow: hidden;
    }

    .pl-item:hover {
      background: var(--surface2);
      border-color: rgba(139,92,246,0.3);
      transform: translateX(3px);
    }

    /* active state — pink glow */
    .pl-item.active {
      background: rgba(139, 92, 246, 0.10);
      border-color: rgba(236, 72, 153, 0.45);
      box-shadow:
        0 0 0 1px rgba(236,72,153,0.25),
        0 0 24px rgba(236,72,153,0.18),
        inset 0 0 20px rgba(139,92,246,0.06);
    }

    /* left accent bar */
    .pl-item.active::before {
      content: '';
      position: absolute;
      left: 0; top: 16%; bottom: 16%;
      width: 3px;
      border-radius: 999px;
      background: linear-gradient(180deg, var(--purple), var(--pink));
      box-shadow: 0 0 10px rgba(236,72,153,0.8);
    }

    .pl-num {
      font-size: 0.78rem;
      font-weight: 600;
      color: rgba(255,255,255,0.25);
      width: 22px;
      text-align: center;
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
      transition: opacity 0.2s;
    }

    .pl-item.active .pl-num { opacity: 0; }

    /* equaliser bars shown when active */
    .eq-bars {
      display: none;
      align-items: flex-end;
      gap: 2px;
      height: 16px;
      width: 22px;
      flex-shrink: 0;
    }

    .pl-item.active .eq-bars { display: flex; }

    .eq-bar {
      flex: 1;
      border-radius: 2px;
      background: linear-gradient(180deg, var(--pink), var(--purple));
      animation: eq-anim 0.8s ease-in-out infinite alternate;
    }

    .eq-bar:nth-child(1) { height: 60%; animation-duration: 0.7s; }
    .eq-bar:nth-child(2) { height: 100%; animation-duration: 0.55s; animation-delay: 0.1s; }
    .eq-bar:nth-child(3) { height: 45%; animation-duration: 0.9s; animation-delay: 0.2s; }

    /* paused — freeze bars */
    .pl-item.active.paused .eq-bar { animation-play-state: paused; }

    @keyframes eq-anim {
      from { transform: scaleY(0.3); }
      to   { transform: scaleY(1); }
    }

    .pl-info { flex: 1; min-width: 0; }

    .pl-name {
      font-size: 0.95rem;
      font-weight: 600;
      color: rgba(255,255,255,0.85);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: color 0.2s;
    }

    .pl-item.active .pl-name,
    .pl-item:hover .pl-name { color: #fff; }

    .pl-item.active .pl-name {
      background: linear-gradient(90deg, var(--purple), var(--pink));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .pl-sub {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.32);
      margin-top: 0.2rem;
      letter-spacing: 0.04em;
    }

    .pl-dur {
      font-size: 0.78rem;
      color: rgba(255,255,255,0.30);
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.04em;
    }

    /* ─── FOOTER ─── */
    footer {
      margin-top: 5rem;
      padding: 2.5rem clamp(1.5rem, 5vw, 4rem);
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .footer-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.45rem;
      letter-spacing: 0.08em;
      text-decoration: none;
      background: linear-gradient(90deg, var(--purple), var(--pink));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .footer-copy {
      font-size: 0.76rem;
      color: rgba(255,255,255,0.28);
      letter-spacing: 0.05em;
    }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 640px) {
      .nav-links  { display: none; }
      .hamburger  { display: flex; }
      .controls   { gap: 1rem; }
      .play-btn   { width: 60px; height: 60px; }
      .skip-btn   { width: 42px; height: 42px; }
      footer      { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav id="mainNav">
    <a href="index.html" class="nav-logo">DJ Carlos</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="mixes.html" class="active">Mixes</a></li>
      <li><a href="index.html#gigs" class="nav-cta">Book</a></li>
    </ul>
    <button class="hamburger" id="hamburger" aria-label="Toggle navigation">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <!-- MOBILE MENU -->
  <div class="mobile-menu" id="mobileMenu">
    <a href="index.html"      onclick="closeMobile()">Home</a>
    <a href="mixes.html"      onclick="closeMobile()">Mixes</a>
    <a href="index.html#gigs" onclick="closeMobile()">Book</a>
  </div>

  <!-- MAIN -->
  <main class="page-wrap">

    <div class="page-header">
      <p class="page-label">DJ Carlos</p>
      <h1 class="page-title">Mixes</h1>
    </div>

    <!-- PLAYER CARD -->
    <div class="player-card" id="playerCard">

      <!-- track info -->
      <div class="track-info">
        <div class="track-art">
          <div class="vinyl" id="vinyl"></div>
        </div>
        <div class="track-meta">
          <div class="track-number" id="trackNumber">Track 1 of 5</div>
          <div class="track-name"   id="trackName">Pulse of the Night</div>
          <div class="track-duration-badge" id="trackDuration">0:00</div>
        </div>
      </div>

      <!-- visualizer -->
      <div class="visualizer-wrap">
        <canvas id="visualizer" aria-hidden="true"></canvas>
      </div>

      <!-- progress -->
      <div class="progress-wrap">
        <div class="progress-bar" id="progressBar" role="slider"
             aria-label="Seek position" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="time-row">
          <span id="timeElapsed">0:00</span>
          <span id="timeTotal">0:00</span>
        </div>
      </div>

      <!-- controls -->
      <div class="controls">
        <!-- shuffle (decorative) -->
        <button class="ctrl-btn" id="shuffleBtn" aria-label="Shuffle" title="Shuffle">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="16 3 21 3 21 8"/>
            <line x1="4" y1="20" x2="21" y2="3"/>
            <polyline points="21 16 21 21 16 21"/>
            <line x1="15" y1="15" x2="21" y2="21"/>
          </svg>
        </button>

        <!-- prev -->
        <button class="ctrl-btn skip-btn" id="prevBtn" aria-label="Previous track">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path d="M19 20L9 12l10-8v16zm-14 0V4h2v16H5z"/>
          </svg>
        </button>

        <!-- play / pause -->
        <button class="play-btn" id="playBtn" aria-label="Play">
          <!-- play icon -->
          <svg class="icon-play" width="26" height="26" viewBox="0 0 24 24" fill="currentColor">
            <path d="M8 5v14l11-7z"/>
          </svg>
          <!-- pause icon -->
          <svg class="icon-pause" width="26" height="26" viewBox="0 0 24 24" fill="currentColor">
            <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
          </svg>
        </button>

        <!-- next -->
        <button class="ctrl-btn skip-btn" id="nextBtn" aria-label="Next track">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path d="M5 4l10 8-10 8V4zm14 16V4h-2v16h2z"/>
          </svg>
        </button>

        <!-- repeat (decorative) -->
        <button class="ctrl-btn" id="repeatBtn" aria-label="Repeat" title="Repeat">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="17 1 21 5 17 9"/>
            <path d="M3 11V9a4 4 0 0 1 4-4h14"/>
            <polyline points="7 23 3 19 7 15"/>
            <path d="M21 13v2a4 4 0 0 1-4 4H3"/>
          </svg>
        </button>
      </div>

      <!-- volume -->
      <div class="volume-row">
        <svg class="vol-icon" id="volIcon" width="18" height="18" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path id="volWave1" d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
          <path id="volWave2" d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
        </svg>
        <input type="range" id="volSlider" min="0" max="100" value="80"
               aria-label="Volume" />
        <span class="vol-pct" id="volPct">80%</span>
      </div>

    </div><!-- /player-card -->

    <!-- PLAYLIST -->
    <p class="playlist-label">All Tracks</p>
    <div class="playlist" id="playlist" role="list"></div>

  </main>

  <footer>
    <a href="index.html" class="footer-logo">DJ Carlos</a>
    <div class="footer-copy">&copy; 2026 DJ Carlos &mdash; Mexico City.</div>
  </footer>

  <!-- hidden audio element -->
  <audio id="audio" preload="metadata"></audio>

  <script>
    /* ── track data ── */
    const tracks = [
      {
        title: 'Pulse of the Night',
        src:   'tracks/pulse-of-the-night.mp3',
        sub:   'Electronic / Pop',
      },
      {
        title: 'Neon Dreams',
        src:   'tracks/neon-dreams.mp3',
        sub:   'Beats / Lo-fi',
      },
      {
        title: 'Urban Pulse',
        src:   'tracks/urban-pulse.mp3',
        sub:   'Urban / Hip-hop',
      },
      {
        title: 'Heat Wave',
        src:   'tracks/heat-wave.mp3',
        sub:   'Upbeat / Latin',
      },
      {
        title: 'Afrobeat',
        src:   'tracks/afrobeat.mp3',
        sub:   'Afrobeat / Disco',

      },
    ];

    /* ── DOM refs ── */
    const audio        = document.getElementById('audio');
    const playBtn      = document.getElementById('playBtn');
    const prevBtn      = document.getElementById('prevBtn');
    const nextBtn      = document.getElementById('nextBtn');
    const progressBar  = document.getElementById('progressBar');
    const progressFill = document.getElementById('progressFill');
    const timeElapsed  = document.getElementById('timeElapsed');
    const timeTotal    = document.getElementById('timeTotal');
    const trackName    = document.getElementById('trackName');
    const trackNumber  = document.getElementById('trackNumber');
    const trackDur     = document.getElementById('trackDuration');
    const volSlider    = document.getElementById('volSlider');
    const volPct       = document.getElementById('volPct');
    const volIcon      = document.getElementById('volIcon');
    const volWave1     = document.getElementById('volWave1');
    const volWave2     = document.getElementById('volWave2');
    const vinyl        = document.getElementById('vinyl');
    const playlist     = document.getElementById('playlist');
    const shuffleBtn   = document.getElementById('shuffleBtn');
    const repeatBtn    = document.getElementById('repeatBtn');

    /* ── state ── */
    let current    = 0;
    let isPlaying  = false;
    let isShuffle  = false;
    let isRepeat   = false;
    let plDurations = new Array(tracks.length).fill(null); // cached durations

    /* ── helpers ── */
    function fmt(s) {
      if (!isFinite(s) || isNaN(s)) return '0:00';
      const m = Math.floor(s / 60);
      const sc = Math.floor(s % 60);
      return `${m}:${sc.toString().padStart(2, '0')}`;
    }

    /* ── build playlist ── */
    tracks.forEach((t, i) => {
      const item = document.createElement('div');
      item.className = 'pl-item';
      item.dataset.index = i;
      item.setAttribute('role', 'listitem');
      item.setAttribute('tabindex', '0');
      item.setAttribute('aria-label', `Play ${t.title}`);
      item.innerHTML = `
        <div class="pl-num">${i + 1}</div>
        <div class="eq-bars">
          <div class="eq-bar"></div>
          <div class="eq-bar"></div>
          <div class="eq-bar"></div>
        </div>
        <div class="pl-info">
          <div class="pl-name">${t.title}</div>
          <div class="pl-sub">${t.sub}</div>
        </div>
        <div class="pl-dur" data-dur="${i}">–:––</div>
      `;
      item.addEventListener('click',   () => selectTrack(i, true));
      item.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') selectTrack(i, true); });
      playlist.appendChild(item);
    });

    /* ── load & (optionally) play track ── */
    function selectTrack(idx, autoPlay = false) {
      current = idx;
      const t = tracks[idx];

      audio.src = t.src;
      audio.load();

      // UI
      trackName.textContent   = t.title;
      trackNumber.textContent = `Track ${idx + 1} of ${tracks.length}`;
      trackDur.textContent    = plDurations[idx] ? fmt(plDurations[idx]) : '0:00';
      progressFill.style.width = '0%';
      timeElapsed.textContent  = '0:00';
      timeTotal.textContent    = plDurations[idx] ? fmt(plDurations[idx]) : '0:00';
      progressBar.setAttribute('aria-valuenow', 0);

      // highlight playlist row
      document.querySelectorAll('.pl-item').forEach((el, i) => {
        el.classList.toggle('active', i === idx);
        el.classList.remove('paused');
      });

      if (autoPlay) {
        playAudio();
      } else {
        setPlayingUI(false);
      }
    }

    function playAudio() {
      const p = audio.play();
      if (p !== undefined) {
        p.then(() => setPlayingUI(true))
         .catch(() => {
           /* autoplay blocked or invalid src — show paused UI gracefully */
           setPlayingUI(false);
         });
      }
    }

    function setPlayingUI(playing) {
      isPlaying = playing;
      playBtn.classList.toggle('playing', playing);
      playBtn.setAttribute('aria-label', playing ? 'Pause' : 'Play');
      vinyl.classList.toggle('spinning', playing);

      const activeItem = document.querySelector('.pl-item.active');
      if (activeItem) activeItem.classList.toggle('paused', !playing);
    }

    /* ── play / pause ── */
    playBtn.addEventListener('click', () => {
      if (audio.src === '' || audio.src === window.location.href) {
        selectTrack(current, true);
        return;
      }
      if (isPlaying) {
        audio.pause();
        setPlayingUI(false);
      } else {
        playAudio();
      }
    });

    /* ── prev / next ── */
    prevBtn.addEventListener('click', () => {
      // restart if >3s in, otherwise go previous
      if (audio.currentTime > 3) {
        audio.currentTime = 0;
        return;
      }
      let next = current - 1;
      if (next < 0) next = tracks.length - 1;
      selectTrack(next, isPlaying);
    });

    nextBtn.addEventListener('click', () => goNext());

    function goNext(force = false) {
      let next;
      if (isShuffle && !force) {
        do { next = Math.floor(Math.random() * tracks.length); }
        while (next === current && tracks.length > 1);
      } else {
        next = (current + 1) % tracks.length;
      }
      selectTrack(next, isPlaying || force);
    }

    /* ── audio events ── */
    audio.addEventListener('timeupdate', () => {
      if (!audio.duration) return;
      const pct = (audio.currentTime / audio.duration) * 100;
      progressFill.style.width = pct + '%';
      timeElapsed.textContent  = fmt(audio.currentTime);
      progressBar.setAttribute('aria-valuenow', Math.round(pct));
    });

    audio.addEventListener('loadedmetadata', () => {
      const d = audio.duration;
      timeTotal.textContent = fmt(d);
      trackDur.textContent  = fmt(d);
      plDurations[current]  = d;
      // update playlist row duration
      const durEl = document.querySelector(`.pl-dur[data-dur="${current}"]`);
      if (durEl) durEl.textContent = fmt(d);
    });

    audio.addEventListener('ended', () => {
      if (isRepeat) {
        audio.currentTime = 0;
        playAudio();
      } else {
        const next = (current + 1) % tracks.length;
        selectTrack(next, true);
      }
    });

    audio.addEventListener('error', () => {
      setPlayingUI(false);
    });

    /* ── progress bar seek ── */
    let seeking = false;

    function seekTo(e) {
      const rect  = progressBar.getBoundingClientRect();
      const ratio = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
      if (audio.duration) {
        audio.currentTime = ratio * audio.duration;
      }
      progressFill.style.width = (ratio * 100) + '%';
    }

    progressBar.addEventListener('mousedown',  e => { seeking = true; seekTo(e); });
    progressBar.addEventListener('touchstart', e => { seeking = true; seekTo(e.touches[0]); }, { passive: true });

    window.addEventListener('mousemove',  e => { if (seeking) seekTo(e); });
    window.addEventListener('touchmove',  e => { if (seeking) seekTo(e.touches[0]); }, { passive: true });
    window.addEventListener('mouseup',    () => { seeking = false; });
    window.addEventListener('touchend',   () => { seeking = false; });

    /* ── volume ── */
    audio.volume = 0.8;

    volSlider.addEventListener('input', () => {
      const v = parseInt(volSlider.value, 10);
      audio.volume = v / 100;
      audio.muted  = v === 0;
      volPct.textContent = v + '%';
      updateVolIcon(v);
      updateSliderBg(volSlider);
    });

    volIcon.addEventListener('click', () => {
      audio.muted = !audio.muted;
      volSlider.value = audio.muted ? 0 : Math.round(audio.volume * 100);
      volPct.textContent = volSlider.value + '%';
      updateVolIcon(parseInt(volSlider.value, 10));
      updateSliderBg(volSlider);
    });

    function updateVolIcon(v) {
      if (v === 0) {
        volWave1.setAttribute('d', '');
        volWave2.setAttribute('d', '');
      } else if (v < 50) {
        volWave1.setAttribute('d', 'M15.54 8.46a5 5 0 0 1 0 7.07');
        volWave2.setAttribute('d', '');
      } else {
        volWave1.setAttribute('d', 'M15.54 8.46a5 5 0 0 1 0 7.07');
        volWave2.setAttribute('d', 'M19.07 4.93a10 10 0 0 1 0 14.14');
      }
    }

    /* gradient fill behind the thumb */
    function updateSliderBg(slider) {
      const pct = ((slider.value - slider.min) / (slider.max - slider.min)) * 100;
      slider.style.background = `linear-gradient(to right, #8B5CF6 0%, #EC4899 ${pct}%, rgba(255,255,255,0.10) ${pct}%)`;
    }

    updateSliderBg(volSlider);
    volSlider.addEventListener('input', () => updateSliderBg(volSlider));

    /* ── shuffle / repeat toggle ── */
    shuffleBtn.addEventListener('click', () => {
      isShuffle = !isShuffle;
      shuffleBtn.style.color = isShuffle ? '#EC4899' : '';
      shuffleBtn.style.filter = isShuffle ? 'drop-shadow(0 0 6px #EC4899)' : '';
    });

    repeatBtn.addEventListener('click', () => {
      isRepeat = !isRepeat;
      repeatBtn.style.color  = isRepeat ? '#8B5CF6' : '';
      repeatBtn.style.filter = isRepeat ? 'drop-shadow(0 0 6px #8B5CF6)' : '';
    });

    /* ── keyboard shortcuts ── */
    document.addEventListener('keydown', e => {
      if (e.target.tagName === 'INPUT') return;
      switch (e.code) {
        case 'Space':
          e.preventDefault();
          playBtn.click();
          break;
        case 'ArrowRight':
          if (audio.duration) audio.currentTime = Math.min(audio.currentTime + 10, audio.duration);
          break;
        case 'ArrowLeft':
          if (audio.duration) audio.currentTime = Math.max(audio.currentTime - 10, 0);
          break;
        case 'ArrowUp':
          volSlider.value = Math.min(parseInt(volSlider.value) + 5, 100);
          volSlider.dispatchEvent(new Event('input'));
          break;
        case 'ArrowDown':
          volSlider.value = Math.max(parseInt(volSlider.value) - 5, 0);
          volSlider.dispatchEvent(new Event('input'));
          break;
        case 'KeyN':
          nextBtn.click();
          break;
        case 'KeyP':
          prevBtn.click();
          break;
      }
    });

    /* ── nav ── */
    const hamburger  = document.getElementById('hamburger');
    const mobileMenu = document.getElementById('mobileMenu');

    hamburger.addEventListener('click', () => {
      hamburger.classList.toggle('open');
      mobileMenu.classList.toggle('open');
    });

    function closeMobile() {
      hamburger.classList.remove('open');
      mobileMenu.classList.remove('open');
    }

    const mainNav = document.getElementById('mainNav');
    window.addEventListener('scroll', () => {
      mainNav.style.boxShadow = window.scrollY > 8
        ? '0 4px 32px rgba(0,0,0,0.65)'
        : 'none';
    }, { passive: true });

    /* ── Web Audio API visualizer ── */
    const canvas  = document.getElementById('visualizer');
    const ctx2d   = canvas.getContext('2d');

    let audioCtx  = null;
    let analyser  = null;
    let source    = null;
    let rafId     = null;
    let vizActive = false;

    const BAR_COUNT = 64;
    const BAR_GAP   = 2;

    /* lazy-init: must happen inside a user gesture */
    function initAudioContext() {
      if (audioCtx) return;                        // already set up
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      analyser = audioCtx.createAnalyser();
      analyser.fftSize            = BAR_COUNT * 4; // 256 → 128 usable bins
      analyser.smoothingTimeConstant = 0.78;
      source   = audioCtx.createMediaElementSource(audio);
      source.connect(analyser);
      analyser.connect(audioCtx.destination);
    }

    /* resize canvas to match its CSS pixel size (handles DPR) */
    function resizeCanvas() {
      const dpr = window.devicePixelRatio || 1;
      const w   = canvas.offsetWidth;
      const h   = canvas.offsetHeight;
      canvas.width  = w * dpr;
      canvas.height = h * dpr;
      ctx2d.scale(dpr, dpr);
    }

    resizeCanvas();
    window.addEventListener('resize', resizeCanvas, { passive: true });

    /* pre-build the gradient once (re-created on resize) */
    function makeGradient(w, h) {
      const g = ctx2d.createLinearGradient(0, h, w, 0);
      g.addColorStop(0,    '#8B5CF6');  // purple at bottom-left
      g.addColorStop(0.5,  '#C084FC');  // light purple mid
      g.addColorStop(1,    '#EC4899');  // pink at top-right
      return g;
    }

    /* idle bar heights — gentle breathing when paused/stopped */
    const idleHeights = Array.from({ length: BAR_COUNT },
      (_, i) => 0.04 + 0.06 * Math.sin(i * 0.45));

    function drawFrame(ts) {
      const cssW = canvas.offsetWidth;
      const cssH = canvas.offsetHeight;

      ctx2d.clearRect(0, 0, cssW, cssH);

      const barW    = (cssW - (BAR_COUNT - 1) * BAR_GAP) / BAR_COUNT;
      const grad    = makeGradient(cssW, cssH);

      let heights;

      if (analyser && vizActive) {
        /* live frequency data */
        const bins = new Uint8Array(analyser.frequencyBinCount); // 128 bins
        analyser.getByteFrequencyData(bins);

        /* sample BAR_COUNT evenly-spaced bins across the lower half of
           the spectrum (bass → high-mid), which is most visually lively */
        const usable = Math.floor(bins.length * 0.55);
        heights = Array.from({ length: BAR_COUNT }, (_, i) => {
          const idx = Math.round((i / BAR_COUNT) * usable);
          return bins[idx] / 255;
        });
      } else {
        /* idle — small ambient bars that breathe softly */
        const phase = ts * 0.0008;
        heights = idleHeights.map((h, i) =>
          h * (0.5 + 0.5 * Math.sin(phase + i * 0.3))
        );
      }

      heights.forEach((norm, i) => {
        const x   = i * (barW + BAR_GAP);
        const bh  = Math.max(2, norm * cssH * 0.92);
        const y   = cssH - bh;

        /* bar fill */
        ctx2d.fillStyle = grad;
        ctx2d.globalAlpha = vizActive ? (0.55 + norm * 0.45) : 0.28;
        ctx2d.beginPath();
        ctx2d.roundRect
          ? ctx2d.roundRect(x, y, barW, bh, [2, 2, 0, 0])
          : ctx2d.rect(x, y, barW, bh);
        ctx2d.fill();

        /* subtle top glow cap */
        if (norm > 0.15 && vizActive) {
          ctx2d.globalAlpha = norm * 0.35;
          ctx2d.fillStyle   = '#EC4899';
          ctx2d.beginPath();
          ctx2d.roundRect
            ? ctx2d.roundRect(x, y, barW, 3, 2)
            : ctx2d.rect(x, y, barW, 3);
          ctx2d.fill();
        }
      });

      ctx2d.globalAlpha = 1;
      rafId = requestAnimationFrame(drawFrame);
    }

    function startViz() {
      vizActive = true;
      if (!rafId) rafId = requestAnimationFrame(drawFrame);
    }

    function pauseViz() {
      vizActive = false;
      /* keep RAF running for the idle animation — just flag vizActive off */
    }

    /* kick off idle animation immediately (no audio context needed) */
    rafId = requestAnimationFrame(drawFrame);

    /* ── patch playAudio to init AudioContext on first user gesture ── */
    const _origPlayAudio = playAudio;
    function playAudio() {
      try {
        initAudioContext();
        if (audioCtx.state === 'suspended') audioCtx.resume();
      } catch (_) { /* API unavailable — silent fallback */ }
      _origPlayAudio();
    }

    /* ── patch setPlayingUI to sync visualizer state ── */
    const _origSetPlayingUI = setPlayingUI;
    function setPlayingUI(playing) {
      _origSetPlayingUI(playing);
      playing ? startViz() : pauseViz();
    }

    /* ── init first track (no autoplay) ── */
    selectTrack(0, false);
  </script>
